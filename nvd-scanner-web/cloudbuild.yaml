steps:
  # Step 1: Build the Docker image from the nvd-scanner-web subdirectory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nvd-scanner-web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nvd-scanner-web:latest'
      - '-f'
      - 'nvd-scanner-web/Dockerfile'
      - 'nvd-scanner-web'

  # Step 2: Push commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nvd-scanner-web:$COMMIT_SHA']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nvd-scanner-web:latest']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nvd-scanner-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nvd-scanner-web:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--project'
      - '$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/nvd-scanner-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nvd-scanner-web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
